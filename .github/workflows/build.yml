name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 缓存Buildozer
        uses: actions/cache@v3
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v3

      - name: 安装系统依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip build-essential git \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev \
            zlib1g-dev zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config \
            libncurses5-dev libffi-dev libssl-dev \
            ccache libsqlite3-dev

      - name: 安装Buildozer和Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer==1.5.0

      - name: 接受Android SDK许可证
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

      - name: 构建APK
        run: |
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: skin-lesion-apk
          path: bin/*.apk
          retention-days: 30
