name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 构建APK
        run: |
          buildozer android debug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: skin-lesion-apk
          path: bin/*.apk
          retention-days: 30
