name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libffi-dev libssl-dev build-essential ccache libsqlite3-dev

      - name: 安装Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: 构建APK
        run: |
          yes | buildozer android debug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: skin-lesion-apk
          path: bin/*.apk
          retention-days: 30
